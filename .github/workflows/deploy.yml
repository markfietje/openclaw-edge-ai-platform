name: Deploy to Jetson

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy-brain-server:
    name: Deploy Brain Server
    runs-on: ubuntu-latest
    # Only run on manual approval or after successful CI
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[deploy]')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install Rust toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
        target: aarch64-unknown-linux-gnu
        
    - name: Build for ARM64
      working-directory: services/brain-server
      run: |
        RUSTFLAGS="-C target-cpu=native -C opt-level=3"         cargo build --release --target aarch64-unknown-linux-gnu -j 1
        
    - name: Create deployment package
      run: |
        cd services/brain-server/target/aarch64-unknown-linux-gnu/release
        tar czf /tmp/brain-server-deploy.tar.gz brain-server
        
    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: brain-server-binary
        path: /tmp/brain-server-deploy.tar.gz
        retention-days: 7

  deploy-signal-gateway:
    name: Deploy Signal Gateway
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[deploy]')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install Rust toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
        target: aarch64-unknown-linux-gnu
        
    - name: Build for ARM64
      working-directory: services/signal-gateway
      run: cargo build --release --target aarch64-unknown-linux-gnu
        
    - name: Create deployment package
      run: |
        cd services/signal-gateway/target/aarch64-unknown-linux-gnu/release
        tar czf /tmp/signal-gateway-deploy.tar.gz signal-gateway
        cd ../../../../..
        tar czf /tmp/signal-gateway-full.tar.gz           scripts/signal-gateway-wrapper.sh           services/openclaw-config/signal-gateway.service           services/signal-gateway/config.yaml
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: signal-gateway-deploy
        path: |
          /tmp/signal-gateway-deploy.tar.gz
          /tmp/signal-gateway-full.tar.gz
        retention-days: 7

  deploy-scripts:
    name: Deploy Scripts and Configs
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[deploy]')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Create deployment package
      run: |
        tar czf /tmp/jetson-scripts-deploy.tar.gz           scripts/cron_ingest.sh           scripts/signal-gateway-wrapper.sh           services/openclaw-config/brain-server.service           services/openclaw-config/periodic-brain-ingest.service           services/openclaw-config/periodic-brain-ingest.timer           services/openclaw-config/signal-gateway.service           services/openclaw-config/config.yaml
          
    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: jetson-scripts
        path: /tmp/jetson-scripts-deploy.tar.gz
        retention-days: 7
