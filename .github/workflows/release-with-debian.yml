name: Release with Debian Packages (Enterprise-Grade)

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  JETSON_USER: jetson
  JETSON_HOST: jetson
  DEPLOY_TIMEOUT: 120

jobs:
  validate-tag:
    name: Validate Release Tag
    runs-on: apple-container
    outputs:
      version: ${{ steps.parse.outputs.version }}
      is_valid: ${{ steps.validate.outputs.is_valid }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate tag format
        id: validate
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "Validating tag: $TAG"

          # Check if tag follows semantic versioning
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag $TAG does not follow semantic versioning (vX.Y.Z)"
            echo "is_valid=false" >> $GITHUB_OUTPUT
            exit 1
          fi

          echo "is_valid=true" >> $GITHUB_OUTPUT
          echo "✅ Tag format is valid"

      - name: Parse version
        id: parse
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Version: $VERSION"

      - name: Check for existing releases
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if gh release view "$TAG" &>/dev/null; then
            echo "::error::Release $TAG already exists"
            exit 1
          fi
          echo "✅ Tag is available for release"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pre-release-tests:
    name: Pre-Release Tests
    runs-on: apple-container
    needs: validate-tag
    if: needs.validate-tag.outputs.is_valid == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install C compiler and build tools
        run: |
          # Check if C compiler is already available
          if command -v cc &> /dev/null || command -v gcc &> /dev/null; then
            echo "✅ C compiler already available"
            cc --version || gcc --version
          else
            echo "⚠️ C compiler not found, attempting installation..."

            if [[ "$RUNNER_OS" == "Linux" ]]; then
              # Try without sudo first (for containerized runners)
              if apt-get update &> /dev/null && apt-get install -y build-essential &> /dev/null; then
                echo "✅ Installed build-essential without sudo"
              elif command -v sudo &> /dev/null; then
                # Fall back to sudo if available
                sudo apt-get update
                sudo apt-get install -y build-essential
                echo "✅ Installed build-essential with sudo"
              else
                echo "::error::Cannot install build-essential: sudo not available and direct installation failed"
                exit 1
              fi
            elif [[ "$RUNNER_OS" == "macOS" ]]; then
              # macOS - try to install Xcode command line tools
              if xcode-select --install 2>&1 | grep -q "already installed"; then
                echo "✅ Xcode tools already installed"
              else
                echo "::warning::Xcode tools installation may require manual intervention"
              fi
            fi
          fi

          # Verify C compiler is now available
          if ! command -v cc &> /dev/null && ! command -v gcc &> /dev/null; then
            echo "::error::C compiler installation failed"
            exit 1
          fi

      - name: Test brain-server
        working-directory: services/brain-server
        run: |
          cargo test --release
          cargo clippy -- -D warnings
          cargo fmt -- --check

      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Test signal-gateway
        working-directory: services/signal-gateway
        run: |
          cargo test --release
          cargo clippy -- -D warnings
          cargo fmt -- --check

      - name: Verify builds
        run: |
          echo "✅ All tests passed"
          echo "✅ Code quality checks passed"

  generate-changelog:
    name: Generate Comprehensive Changelog
    runs-on: apple-container
    needs: [validate-tag, pre-release-tests]
    if: always() && needs.pre-release-tests.result == 'success'

    outputs:
      changelog_path: ${{ steps.generate.outputs.changelog_path }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Make changelog script executable
        run: chmod +x scripts/generate-changelog.sh

      - name: Generate comprehensive changelog
        id: generate
        run: |
          VERSION="${{ needs.validate-tag.outputs.version }}"

          echo "📝 Generating comprehensive changelog for v${VERSION}..."

          # Run the changelog generator script
          ./scripts/generate-changelog.sh "$VERSION"

          # Set output path
          echo "changelog_path=build/release-notes.md" >> $GITHUB_OUTPUT

          echo "📄 Changelog generated at build/release-notes.md"
          echo ""
          echo "Preview (first 100 lines):"
          echo "----------------------------------------"
          head -100 build/release-notes.md || echo "Could not preview changelog"
          echo "----------------------------------------"

      - name: Upload changelog artifact
        uses: actions/upload-artifact@v4
        with:
          name: changelog
          path: build/release-notes.md
          retention-days: 90

  build-binaries:
    name: Build ARM64 Binaries
    runs-on: apple-container
    needs: [validate-tag, generate-changelog]
    if: always() && needs.generate-changelog.result == 'success'

    strategy:
      matrix:
        include:
          - service: brain-server
            target: aarch64-unknown-linux-gnu
            artifact_name: brain-server
          - service: signal-gateway
            target: aarch64-unknown-linux-gnu
            artifact_name: signal-gateway

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - name: Install cross-compilation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache cargo
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            services/${{ matrix.service }}/target
          key: ${{ runner.os }}-${{ matrix.service }}-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Build optimized ARM64 binary
        working-directory: services/${{ matrix.service }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: |
          cargo build --release --target ${{ matrix.target }}

          # Verify binary was created
          if [ ! -f "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" ]; then
            echo "::error::Binary not found after build"
            exit 1
          fi

          # Show binary info
          echo "✅ Binary built successfully"
          ls -lh "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}"
          file "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}"

      - name: Create release tarball
        run: |
          SERVICE="${{ matrix.service }}"
          ARTIFACT="${{ matrix.artifact_name }}"
          VERSION="${{ needs.validate-tag.outputs.version }}"

          cd "services/${SERVICE}/target/${{ matrix.target }}/release"

          # Create tarball
          tar czf "${ARTIFACT}-arm64.tar.gz" "${ARTIFACT}"

          # Generate checksum
          sha256sum "${ARTIFACT}-arm64.tar.gz" > "${ARTIFACT}-arm64.tar.gz.sha256"

          # Move to accessible location
          mv "${ARTIFACT}-arm64.tar.gz" "${GITHUB_WORKSPACE}/"
          mv "${ARTIFACT}-arm64.tar.gz.sha256" "${GITHUB_WORKSPACE}/"

          echo "✅ Tarball created: ${ARTIFACT}-arm64.tar.gz"
          ls -lh "${GITHUB_WORKSPACE}/${ARTIFACT}-arm64.tar.gz"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-binary
          path: |
            ${{ matrix.artifact_name }}-arm64.tar.gz
            ${{ matrix.artifact_name }}-arm64.tar.gz.sha256
          retention-days: 90

  build-debian-packages:
    name: Build Debian Packages
    runs-on: apple-container
    needs: [validate-tag, build-binaries]
    if: always() && needs.build-binaries.result == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Debian packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev fakeroot

      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/artifacts

      - name: Prepare build environment
        run: |
          VERSION="${{ needs.validate-tag.outputs.version }}"

          # Create build directory
          mkdir -p build/debian-packages

          # Extract binaries for packaging
          cd /tmp/artifacts

          for service_dir in */; do
            service=$(basename "$service_dir")
            echo "Processing $service..."

            cd "$service_dir"

            if [ -f *-arm64.tar.gz ]; then
              tar xzf *-arm64.tar.gz
            fi

            cd ..
          done

          echo "✅ Build environment prepared"

      - name: Build brain-server .deb package
        run: |
          VERSION="${{ needs.validate-tag.outputs.version }}"
          SERVICE="brain-server"

          echo "Building ${SERVICE} .deb package..."

          cd "packages/${SERVICE}"

          # Create package directory
          PKG_DIR="../../build/debian-packages/${SERVICE}_${VERSION}_arm64"
          rm -rf "$PKG_DIR"
          mkdir -p "$PKG_DIR/DEBIAN"

          # Copy control files
          cp debian/control "$PKG_DIR/DEBIAN/"
          cp debian/postinst "$PKG_DIR/DEBIAN/"
          cp debian/prerm "$PKG_DIR/DEBIAN/"
          cp debian/postrm "$PKG_DIR/DEBIAN/"

          chmod 755 "$PKG_DIR/DEBIAN/"*

          # Create directory structure
          mkdir -p "$PKG_DIR/usr/local/bin"
          mkdir -p "$PKG_DIR/etc/systemd/system"
          mkdir -p "$PKG_DIR/etc/${SERVICE}"
          mkdir -p "$PKG_DIR/var/lib/${SERVICE}"
          mkdir -p "$PKG_DIR/usr/share/doc/${SERVICE}"

          # Copy binary
          if [ -f "/tmp/artifacts/${SERVICE}-binary/${SERVICE}" ]; then
            cp "/tmp/artifacts/${SERVICE}-binary/${SERVICE}" "$PKG_DIR/usr/local/bin/"
            chmod 755 "$PKG_DIR/usr/local/bin/${SERVICE}"
          else
            echo "::error::Binary not found for ${SERVICE}"
            exit 1
          fi

          # Copy systemd service
          if [ -f "${SERVICE}.service" ]; then
            cp "${SERVICE}.service" "$PKG_DIR/etc/systemd/system/"
            chmod 644 "$PKG_DIR/etc/systemd/system/${SERVICE}.service"
          fi

          # Copy documentation
          if [ -f "../../README.md" ]; then
            cp "../../README.md" "$PKG_DIR/usr/share/doc/${SERVICE}/"
          fi

          # Create conffiles
          echo "/etc/${SERVICE}/config.toml" > "$PKG_DIR/DEBIAN/conffiles"

          # Update control file with version
          sed -i "s/Version:.*/Version: ${VERSION}/" "$PKG_DIR/DEBIAN/control" || true

          # Build package
          cd ../../build/debian-packages
          fakeroot dpkg-deb --build "${SERVICE}_${VERSION}_arm64"

          if [ ! -f "${SERVICE}_${VERSION}_arm64.deb" ]; then
            echo "::error::Failed to build ${SERVICE} package"
            exit 1
          fi

          echo "✅ ${SERVICE} .deb package built"
          ls -lh "${SERVICE}_${VERSION}_arm64.deb"

      - name: Build signal-gateway .deb package
        run: |
          VERSION="${{ needs.validate-tag.outputs.version }}"
          SERVICE="signal-gateway"

          echo "Building ${SERVICE} .deb package..."

          cd "packages/${SERVICE}"

          # Create package directory
          PKG_DIR="../../build/debian-packages/${SERVICE}_${VERSION}_arm64"
          rm -rf "$PKG_DIR"
          mkdir -p "$PKG_DIR/DEBIAN"

          # Copy control files
          cp debian/control "$PKG_DIR/DEBIAN/"
          cp debian/postinst "$PKG_DIR/DEBIAN/"
          cp debian/prerm "$PKG_DIR/DEBIAN/"
          cp debian/postrm "$PKG_DIR/DEBIAN/"

          chmod 755 "$PKG_DIR/DEBIAN/"*

          # Create directory structure
          mkdir -p "$PKG_DIR/usr/local/bin"
          mkdir -p "$PKG_DIR/etc/systemd/system"
          mkdir -p "$PKG_DIR/etc/${SERVICE}"
          mkdir -p "$PKG_DIR/var/lib/${SERVICE}"
          mkdir -p "$PKG_DIR/usr/share/doc/${SERVICE}"

          # Copy binary
          if [ -f "/tmp/artifacts/${SERVICE}-binary/${SERVICE}" ]; then
            cp "/tmp/artifacts/${SERVICE}-binary/${SERVICE}" "$PKG_DIR/usr/local/bin/"
            chmod 755 "$PKG_DIR/usr/local/bin/${SERVICE}"
          else
            echo "::error::Binary not found for ${SERVICE}"
            exit 1
          fi

          # Copy wrapper script
          if [ -f "../../scripts/signal-gateway-wrapper.sh" ]; then
            cp "../../scripts/signal-gateway-wrapper.sh" "$PKG_DIR/usr/local/bin/"
            chmod 755 "$PKG_DIR/usr/local/bin/signal-gateway-wrapper.sh"
          fi

          # Copy systemd service
          if [ -f "${SERVICE}.service" ]; then
            cp "${SERVICE}.service" "$PKG_DIR/etc/systemd/system/"
            chmod 644 "$PKG_DIR/etc/systemd/system/${SERVICE}.service"
          fi

          # Copy documentation
          if [ -f "../../README.md" ]; then
            cp "../../README.md" "$PKG_DIR/usr/share/doc/${SERVICE}/"
          fi

          # Create conffiles
          echo "/etc/${SERVICE}/config.toml" > "$PKG_DIR/DEBIAN/conffiles"

          # Update control file with version
          sed -i "s/Version:.*/Version: ${VERSION}/" "$PKG_DIR/DEBIAN/control" || true

          # Build package
          cd ../../build/debian-packages
          fakeroot dpkg-deb --build "${SERVICE}_${VERSION}_arm64"

          if [ ! -f "${SERVICE}_${VERSION}_arm64.deb" ]; then
            echo "::error::Failed to build ${SERVICE} package"
            exit 1
          fi

          echo "✅ ${SERVICE} .deb package built"
          ls -lh "${SERVICE}_${VERSION}_arm64.deb"

      - name: Generate checksums for .deb packages
        run: |
          cd build/debian-packages

          # Generate SHA256 checksums
          sha256sum *.deb > SHA256SUMS-deb.txt

          echo "✅ Checksums generated"
          cat SHA256SUMS-deb.txt

      - name: Upload Debian packages
        uses: actions/upload-artifact@v4
        with:
          name: debian-packages
          path: |
            build/debian-packages/*.deb
            build/debian-packages/SHA256SUMS-deb.txt
          retention-days: 90

  create-github-release:
    name: Create GitHub Release
    runs-on: apple-container
    needs:
      [validate-tag, generate-changelog, build-binaries, build-debian-packages]
    if: always() && needs.build-debian-packages.result == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/artifacts

      - name: Prepare release assets
        run: |
          VERSION="${{ needs.validate-tag.outputs.version }}"
          TAG="v${VERSION}"

          echo "📦 Preparing release assets for ${TAG}..."

          # Create release directory
          mkdir -p /tmp/release-assets

          # Copy binary tarballs
          if [ -d "/tmp/artifacts/brain-server-binary" ]; then
            cp /tmp/artifacts/brain-server-binary/*.tar.gz /tmp/release-assets/ || true
            cp /tmp/artifacts/brain-server-binary/*.sha256 /tmp/release-assets/ || true
          fi

          if [ -d "/tmp/artifacts/signal-gateway-binary" ]; then
            cp /tmp/artifacts/signal-gateway-binary/*.tar.gz /tmp/release-assets/ || true
            cp /tmp/artifacts/signal-gateway-binary/*.sha256 /tmp/release-assets/ || true
          fi

          # Copy Debian packages
          if [ -d "/tmp/artifacts/debian-packages" ]; then
            cp /tmp/artifacts/debian-packages/*.deb /tmp/release-assets/ || true
          fi

          # Copy changelog
          if [ -f "/tmp/artifacts/changelog/release-notes.md" ]; then
            cp /tmp/artifacts/changelog/release-notes.md /tmp/release-notes.md
          fi

          # Generate comprehensive checksums
          cd /tmp/release-assets
          sha256sum * > SHA256SUMS.txt

          # List all assets
          echo "✅ Release assets prepared:"
          ls -lh /tmp/release-assets/

          echo ""
          echo "Total size: $(du -sh /tmp/release-assets | cut -f1)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body_path: /tmp/release-notes.md
          draft: false
          prerelease: false
          files: /tmp/release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify release
        run: |
          TAG="${{ github.ref_name }}"

          echo "🔍 Verifying release ${TAG}..."

          # Wait a moment for release to be available
          sleep 5

          # Check release exists
          if gh release view "$TAG" &>/dev/null; then
            echo "✅ Release ${TAG} created successfully"

            # Show release info
            gh release view "$TAG" | head -20
          else
            echo "::error::Release ${TAG} not found"
            exit 1
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-to-jetson:
    name: Deploy Release to Jetson
    runs-on: apple-container
    needs: [validate-tag, create-github-release]
    if: always() && needs.create-github-release.result == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Debian packages
        uses: actions/download-artifact@v4
        with:
          name: debian-packages
          path: /tmp/debian-packages

      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.JETSON_SSH_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.JETSON_SSH_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Backup current deployment
        run: |
          BACKUP_DIR="/tmp/backup_$(date +%Y%m%d_%H%M%S)"

          echo "Creating backup at ${BACKUP_DIR}..."

          ssh ${JETSON_USER}@${JETSON_HOST} "
            mkdir -p ${BACKUP_DIR}

            # Backup binaries
            if [ -f /usr/local/bin/brain-server ]; then
              cp /usr/local/bin/brain-server ${BACKUP_DIR}/
            fi

            if [ -f /usr/local/bin/signal-gateway ]; then
              cp /usr/local/bin/signal-gateway ${BACKUP_DIR}/
            fi

            # Backup configs
            if [ -d /etc/brain-server ]; then
              cp -r /etc/brain-server ${BACKUP_DIR}/
            fi

            if [ -d /etc/signal-gateway ]; then
              cp -r /etc/signal-gateway ${BACKUP_DIR}/
            fi

            echo 'Backup created: ${BACKUP_DIR}'
            ls -lh ${BACKUP_DIR}
          "

      - name: Deploy brain-server
        env:
          SSH_KEY: ${{ secrets.JETSON_SSH_KEY }}
        run: |
          VERSION="${{ needs.validate-tag.outputs.version }}"

          echo "🚀 Deploying brain-server v${VERSION}..."

          # Copy .deb package to Jetson
          scp /tmp/debian-packages/brain-server_${VERSION}_arm64.deb \
            ${JETSON_USER}@${JETSON_HOST}:/tmp/

          # Install package
          ssh ${JETSON_USER}@${JETSON_HOST} "
            sudo systemctl stop brain-server || true

            sudo dpkg -i /tmp/brain-server_${VERSION}_arm64.deb || {
              echo 'Installation failed, attempting rollback...'
              sudo dpkg --configure -a
              exit 1
            }

            sudo systemctl daemon-reload
            sudo systemctl start brain-server

            # Wait for service to start
            sleep 3

            # Verify service is running
            if sudo systemctl is-active --quiet brain-server; then
              echo '✅ brain-server is running'
            else
              echo '::error::brain-server failed to start'
              sudo journalctl -u brain-server -n 50
              exit 1
            fi
          "

          echo "✅ brain-server deployed successfully"

      - name: Deploy signal-gateway
        env:
          SSH_KEY: ${{ secrets.JETSON_SSH_KEY }}
        run: |
          VERSION="${{ needs.validate-tag.outputs.version }}"

          echo "🚀 Deploying signal-gateway v${VERSION}..."

          # Copy .deb package to Jetson
          scp /tmp/debian-packages/signal-gateway_${VERSION}_arm64.deb \
            ${JETSON_USER}@${JETSON_HOST}:/tmp/

          # Install package
          ssh ${JETSON_USER}@${JETSON_HOST} "
            sudo systemctl stop signal-gateway || true

            sudo dpkg -i /tmp/signal-gateway_${VERSION}_arm64.deb || {
              echo 'Installation failed, attempting rollback...'
              sudo dpkg --configure -a
              exit 1
            }

            sudo systemctl daemon-reload
            sudo systemctl start signal-gateway

            # Wait for service to start
            sleep 5

            # Verify service is running
            if sudo systemctl is-active --quiet signal-gateway; then
              echo '✅ signal-gateway is running'
            else
              echo '::error::signal-gateway failed to start'
              sudo journalctl -u signal-gateway -n 50
              exit 1
            fi
          "

          echo "✅ signal-gateway deployed successfully"

      - name: Verify deployment
        env:
          SSH_KEY: ${{ secrets.JETSON_SSH_KEY }}
        run: |
          echo "🔍 Running comprehensive deployment verification..."

          ssh ${JETSON_USER}@${JETSON_HOST} "
            set -e

            echo ''
            echo '═══════════════════════════════════════════════════════'
            echo '  Deployment Verification'
            echo '═══════════════════════════════════════════════════════'
            echo ''

            # Check brain-server
            echo '🔍 Brain Server:'
            if sudo systemctl is-active --quiet brain-server; then
              echo '  ✅ Service: Running'

              # Test health endpoint
              HEALTH=\$(curl -s http://localhost:8765/health)
              if [ \"\$HEALTH\" = 'OK' ]; then
                echo '  ✅ Health: OK'
              else
                echo '  ⚠️  Health: '\$HEALTH
              fi

              # Show version
              if [ -f /usr/local/bin/brain-server ]; then
                echo '  ✅ Binary: Installed'
              fi
            else
              echo '  ❌ Service: Not running'
              exit 1
            fi

            echo ''

            # Check signal-gateway
            echo '🔍 Signal Gateway:'
            if sudo systemctl is-active --quiet signal-gateway; then
              echo '  ✅ Service: Running'

              # Test health endpoint
              HEALTH=\$(curl -s http://localhost:8080/v1/health)
              if echo \"\$HEALTH\" | grep -q 'healthy'; then
                echo '  ✅ Health: OK'
              else
                echo '  ⚠️  Health: '\$HEALTH
              fi

              # Show version
              if [ -f /usr/local/bin/signal-gateway ]; then
                echo '  ✅ Binary: Installed'
              fi
            else
              echo '  ❌ Service: Not running'
              exit 1
            fi

            echo ''
            echo '✅ All services verified successfully'
          "

      - name: Rollback on failure
        if: failure()
        env:
          SSH_KEY: ${{ secrets.JETSON_SSH_KEY }}
        run: |
          echo "⚠️  Deployment failed, initiating rollback..."

          ssh ${JETSON_USER}@${JETSON_HOST} "
            # Find the most recent backup
            BACKUP_DIR=\$(ls -dt /tmp/backup_* 2>/dev/null | head -1)

            if [ -z \"\$BACKUP_DIR\" ]; then
              echo 'No backup found, cannot rollback'
              exit 1
            fi

            echo 'Restoring from backup: '\$BACKUP_DIR

            # Stop services
            sudo systemctl stop brain-server signal-gateway || true

            # Restore binaries
            if [ -f \"\$BACKUP_DIR/brain-server\" ]; then
              sudo cp \"\$BACKUP_DIR/brain-server\" /usr/local/bin/
              echo 'Restored brain-server binary'
            fi

            if [ -f \"\$BACKUP_DIR/signal-gateway\" ]; then
              sudo cp \"\$BACKUP_DIR/signal-gateway\" /usr/local/bin/
              echo 'Restored signal-gateway binary'
            fi

            # Restore configs
            if [ -d \"\$BACKUP_DIR/brain-server\" ]; then
              sudo cp -r \"\$BACKUP_DIR/brain-server\" /etc/
              echo 'Restored brain-server config'
            fi

            if [ -d \"\$BACKUP_DIR/signal-gateway\" ]; then
              sudo cp -r \"\$BACKUP_DIR/signal-gateway\" /etc/
              echo 'Restored signal-gateway config'
            fi

            # Restart services
            sudo systemctl daemon-reload
            sudo systemctl start brain-server signal-gateway || true

            echo '✅ Rollback completed'
          "

      - name: Cleanup
        if: always()
        run: |
          rm -f ~/.ssh/id_ed25519
          rm -f ~/.ssh/known_hosts

  release-notification:
    name: Send Release Notification
    runs-on: apple-container
    needs: [validate-tag, create-github-release, deploy-to-jetson]
    if: always() && needs.create-github-release.result == 'success'

    steps:
      - name: Generate release summary
        run: |
          VERSION="${{ needs.validate-tag.outputs.version }}"
          TAG="v${VERSION}"

          echo "📊 Release Summary for ${TAG}"
          echo "═══════════════════════════════════════════════════════"
          echo ""
          echo "Version: ${VERSION}"
          echo "Release: https://github.com/markfietje/jetson-openclaw-setup/releases/tag/${TAG}"
          echo ""
          echo "Artifacts:"
          echo "  - brain-server_${VERSION}_arm64.deb"
          echo "  - signal-gateway_${VERSION}_arm64.deb"
          echo "  - brain-server-arm64.tar.gz"
          echo "  - signal-gateway-arm64.tar.gz"
          echo "  - SHA256SUMS.txt"
          echo ""

          if [ "${{ needs.deploy-to-jetson.result }}" = "success" ]; then
            echo "✅ Deployment: Successful"
            echo "   Both services are running on Jetson Nano"
          else
            echo "⚠️  Deployment: ${{ needs.deploy-to-jetson.result }}"
          fi

          echo ""
          echo "═══════════════════════════════════════════════════════"

      - name: Create tag commit message
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="${{ needs.validate-tag.outputs.version }}"
          TAG="v${VERSION}"

          # This could be extended to send notifications to:
          # - Slack
          # - Discord
          # - Email
          # - etc.

          echo "Release ${TAG} completed successfully!"
