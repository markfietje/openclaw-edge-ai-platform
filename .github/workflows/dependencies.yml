name: Dependency Updates

on:
  schedule:
    # Run every Monday at 9:00 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  cargo-outdated:
    name: Check Outdated Dependencies
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [brain-server, signal-gateway]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install Rust toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
        
    - name: Install cargo-outdated
      run: cargo install cargo-outdated
      
    - name: Check for outdated dependencies
      working-directory: services/${{ matrix.service }}
      run: |
        cargo outdated > /tmp/outdated.txt 2>&1 || true
        cat /tmp/outdated.txt
        
    - name: Upload results
      uses: actions/upload-artifact@v3
      with:
        name: ${{ matrix.service }}-outdated-deps
        path: /tmp/outdated.txt
        retention-days: 30

  cargo-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [brain-server, signal-gateway]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install Rust toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
        
    - name: Install cargo-audit
      run: cargo install cargo-audit
      
    - name: Run security audit
      working-directory: services/${{ matrix.service }}
      run: |
        cargo audit > /tmp/audit.txt 2>&1 || true
        cat /tmp/audit.txt
        
    - name: Upload results
      uses: actions/upload-artifact@v3
      with:
        name: ${{ matrix.service }}-security-audit
        path: /tmp/audit.txt
        retention-days: 30
