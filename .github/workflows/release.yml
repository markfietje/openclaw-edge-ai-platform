name: Create Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        include:
          - service: brain-server
            target: aarch64-unknown-linux-gnu
            artifact_name: brain-server
          - service: signal-gateway
            target: aarch64-unknown-linux-gnu
            artifact_name: signal-gateway
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install Rust toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
        target: ${{ matrix.target }}
        
    - name: Cache cargo
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          services/${{ matrix.service }}/target
        key: ${{ runner.os }}-${{ matrix.service }}-${{ hashFiles('**/Cargo.lock') }}
        
    - name: Build for ARM64 (Jetson)
      working-directory: services/${{ matrix.service }}
      run: |
        if [ "${{ matrix.service }}" = "brain-server" ]; then
          RUSTFLAGS="-C target-cpu=native -C opt-level=3 -C lto=fat" \
          cargo build --release --target ${{ matrix.target }} -j 1
        else
          cargo build --release --target ${{ matrix.target }}
        fi
        
    - name: Create release package
      run: |
        cd services/${{ matrix.service }}/target/${{ matrix.target }}/release
        tar czf /tmp/${{ matrix.service }}-arm64.tar.gz ${{ matrix.artifact_name }}
        
    - name: Generate checksums
      run: |
        cd /tmp
        sha256sum ${{ matrix.service }}-arm64.tar.gz > checksums.txt
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: ${{ matrix.service }}-arm64-binary
        path: |
          /tmp/${{ matrix.service }}-arm64.tar.gz
          /tmp/checksums.txt
        retention-days: 90

  create-github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-and-release
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Download all artifacts
      uses: actions/download-artifact@v3
      with:
        path: /tmp/artifacts
        
    - name: Prepare release assets
      run: |
        mkdir -p /tmp/release-assets
        find /tmp/artifacts -name "*.tar.gz" -exec cp {} /tmp/release-assets/ \;
        find /tmp/artifacts -name "checksums.txt" -exec cat {} >> /tmp/release-assets/SHA256SUMS.txt \;
        
    - name: Generate release notes
      id: release_notes
      run: |
        TAG=${{ github.ref_name }}
        
        cat > /tmp/release_notes.md << 'NOTES'
        ## 🚀 Release: $TAG
        
        ### 📦 Pre-built Binaries (ARM64/Jetson)
        
        The following binaries are compiled for ARM64 (Jetson Nano, Raspberry Pi 4+):
        
        | Service | Binary | Download |
        |---------|--------|----------|
        | Brain Server | brain-server-arm64.tar.gz | [Download](https://github.com/markfietje/jetson-openclaw-setup/releases/download/$TAG/brain-server-arm64.tar.gz) |
        | Signal Gateway | signal-gateway-arm64.tar.gz | [Download](https://github.com/markfietje/jetson-openclaw-setup/releases/download/$TAG/signal-gateway-arm64.tar.gz) |
        
        ### 📋 Installation
        
        Shell:
        wget https://github.com/markfietje/jetson-openclaw-setup/releases/download/$TAG/brain-server-arm64.tar.gz
        wget https://github.com/markfietje/jetson-openclaw-setup/releases/download/$TAG/signal-gateway-arm64.tar.gz
        
        tar xzf brain-server-arm64.tar.gz
        tar xzf signal-gateway-arm64.tar.gz
        
        sudo cp brain-server /usr/local/bin/
        sudo cp signal-gateway /usr/local/bin/
        
        ### ✅ Verify Checksums
        
        Shell:
        wget https://github.com/markfietje/jetson-openclaw-setup/releases/download/$TAG/SHA256SUMS.txt
        sha256sum -c SHA256SUMS.txt
        
        ---
        
        ### 📖 What's Changed
        
        NOTES
        
        # Get commits since last tag
        git log --pretty=format:"- %s (%h)" $(git describe --tags --abbrev=0 HEAD^)..HEAD >> /tmp/release_notes.md
        
        cat /tmp/release_notes.md
        
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        body_path: /tmp/release_notes.md
        draft: false
        prerelease: false
        files: |
          /tmp/release-assets/*.tar.gz
          /tmp/release-assets/*.txt
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
