name: Signal Gateway CI

on:
  push:
    branches: [ main, dev ]
    paths:
      - 'services/signal-gateway/**'
      - '.github/workflows/signal-gateway-ci.yml'
  pull_request:
    branches: [ main, dev ]
    paths:
      - 'services/signal-gateway/**'
      - '.github/workflows/signal-gateway-ci.yml'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test Signal Gateway
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install Rust toolchain
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
        components: rustfmt, clippy
        target: aarch64-unknown-linux-gnu
        
    - name: Install cross-compilation tools
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu
        
    - name: Cache cargo registry
      uses: actions/cache@v3
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
        
    - name: Cache cargo index
      uses: actions/cache@v3
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
        
    - name: Cache cargo build
      uses: actions/cache@v3
      with:
        path: services/signal-gateway/target
        key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('services/signal-gateway/**/Cargo.lock') }}
        
    - name: Check formatting
      working-directory: services/signal-gateway
      run: cargo fmt -- --check
      
    - name: Run clippy
      working-directory: services/signal-gateway
      run: cargo clippy -- -D warnings
      
    - name: Run tests
      working-directory: services/signal-gateway
      run: cargo test --verbose
      
    - name: Build for x86_64 (CI test)
      working-directory: services/signal-gateway
      run: cargo build --release
      
    - name: Build for ARM64 (Jetson)
      working-directory: services/signal-gateway
      run: cargo build --release --target aarch64-unknown-linux-gnu
      
    - name: Check binary exists
      working-directory: services/signal-gateway
      run: |
        test -f target/release/signal-gateway
        test -f target/aarch64-unknown-linux-gnu/release/signal-gateway

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    continue-on-error: true
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install cargo-audit
      run: cargo install cargo-audit
      
    - name: Run cargo audit
      working-directory: services/signal-gateway
      run: cargo audit
