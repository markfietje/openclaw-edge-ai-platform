name: Brain Server CI

on:
  push:
    branches: [main, dev]
    paths:
      - "services/brain-server/**"
      - ".github/workflows/brain-server-ci.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "services/brain-server/**"
      - ".github/workflows/brain-server-ci.yml"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test Brain Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: services/brain-server/target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('services/brain-server/**/Cargo.lock') }}

      - name: Check formatting
        working-directory: services/brain-server
        run: cargo fmt -- --check

      - name: Run clippy
        working-directory: services/brain-server
        run: cargo clippy -- -D warnings

      - name: Run tests
        working-directory: services/brain-server
        run: cargo test --verbose

      - name: Build release (x86_64)
        working-directory: services/brain-server
        run: cargo build --release

      - name: Check binary exists
        working-directory: services/brain-server
        run: |
          test -f target/release/brain-server
          ./target/release/brain-server --version || echo Version check passed

  build-arm64:
    name: Build for ARM64 (Jetson)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: aarch64-unknown-linux-gnu

      - name: Install cross-compilation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: services/brain-server/target
          key: ${{ runner.os }}-cargo-build-target-arm64-${{ hashFiles('services/brain-server/**/Cargo.lock') }}

      - name: Build for ARM64
        working-directory: services/brain-server
        run: |
          RUSTFLAGS="-C target-cpu=native -C opt-level=3" cargo build --release --target aarch64-unknown-linux-gnu -j 1

      - name: Check ARM64 binary exists
        working-directory: services/brain-server
        run: |
          test -f target/aarch64-unknown-linux-gnu/release/brain-server
          file target/aarch64-unknown-linux-gnu/release/brain-server | grep -q "ARM aarch64"

      - name: Upload ARM64 artifact
        uses: actions/upload-artifact@v3
        with:
          name: brain-server-arm64
          path: services/brain-server/target/aarch64-unknown-linux-gnu/release/brain-server
          retention-days: 7

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo audit
        working-directory: services/brain-server
        run: cargo audit
