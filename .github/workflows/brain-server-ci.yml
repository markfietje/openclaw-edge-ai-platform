name: Brain Server CI

on:
  push:
    branches: [main, dev]
    paths:
      - "services/brain-server/**"
      - ".github/workflows/brain-server-ci.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "services/brain-server/**"
      - ".github/workflows/brain-server-ci.yml"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0

jobs:
  format:
    name: Code Formatting
    runs-on: [self-hosted, apple-container]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check formatting
        run: |
          echo "🎨 Checking code formatting in Linux container..."
          /usr/local/bin/container run --rm \
            --platform linux/arm64 \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -w /workspace/services/brain-server \
            rust:latest \
            bash -c "cargo fmt -- --check && echo '✅ Code is properly formatted'"

  lint:
    name: Linting (Clippy)
    runs-on: [self-hosted, apple-container]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Run clippy
        run: |
          echo "🔍 Running clippy lints in Linux container..."
          /usr/local/bin/container run --rm \
            --platform linux/arm64 \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -v ~/.cargo/registry:/root/.cargo/registry \
            -v ~/.cargo/git:/root/.cargo/git \
            -w /workspace/services/brain-server \
            rust:latest \
            bash -c "cargo clippy --all-targets --all-features -- -D warnings && echo '✅ No linting errors found'"

  test:
    name: Unit Tests
    runs-on: [self-hosted, apple-container]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: services/brain-server/target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('services/brain-server/**/Cargo.lock') }}

      - name: Run tests
        run: |
          echo "🧪 Running unit tests in Linux container..."
          /usr/local/bin/container run --rm \
            --platform linux/arm64 \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -v ~/.cargo/registry:/root/.cargo/registry \
            -v ~/.cargo/git:/root/.cargo/git \
            -v "${GITHUB_WORKSPACE}/services/brain-server/target:/workspace/services/brain-server/target" \
            -w /workspace/services/brain-server \
            rust:latest \
            bash -c "cargo test --verbose -- --test-threads=1 && echo '✅ All tests passed'"

  coverage:
    name: Code Coverage
    runs-on: [self-hosted, apple-container]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Generate coverage report
        run: |
          echo "📊 Generating code coverage report in Linux container..."
          /usr/local/bin/container run --rm \
            --platform linux/arm64 \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -v ~/.cargo/registry:/root/.cargo/registry \
            -v ~/.cargo/git:/root/.cargo/git \
            -v "${GITHUB_WORKSPACE}/services/brain-server/target:/workspace/services/brain-server/target" \
            -w /workspace/services/brain-server \
            rust:latest \
            bash -c "
              cargo install cargo-tarpaulin &&
              cargo tarpaulin --verbose --all-features --workspace --timeout 120 \
                --out Xml --out Html --output-dir ./coverage
            "

      - name: Display coverage summary
        working-directory: services/brain-server
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📊 Code Coverage Summary"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          # Parse cobertura.xml for coverage percentage
          COVERAGE=$(grep -oP 'line-rate="\K[0-9.]+' coverage/cobertura.xml | head -1)
          PERCENTAGE=$(echo "$COVERAGE * 100" | bc)
          printf "Coverage: %.2f%%\n" "$PERCENTAGE"

          # Check if coverage meets threshold (80%)
          if (( $(echo "$PERCENTAGE < 80" | bc -l) )); then
            echo "⚠️  Warning: Coverage is below 80%"
            echo "   Please add more tests to improve coverage"
          else
            echo "✅ Coverage meets 80% threshold"
          fi

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./services/brain-server/coverage/cobertura.xml
          flags: brain-server
          name: brain-server-coverage
          fail_ci_if_error: false

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: brain-server-coverage-report
          path: services/brain-server/coverage/
          retention-days: 30

      - name: Add coverage to PR comment
        if: github.event_name == 'pull_request'
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.GITHUB_TOKEN }}
          MINIMUM_GREEN: 80

  security-audit:
    name: Security Audit
    runs-on: [self-hosted, apple-container]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Run security audit
        id: audit
        run: |
          echo "🔒 Running security audit in Linux container..."
          /usr/local/bin/container run --rm \
            --platform linux/arm64 \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -v ~/.cargo/registry:/root/.cargo/registry \
            -w /workspace/services/brain-server \
            rust:latest \
            bash -c "
              cargo install cargo-audit &&
              cargo audit --json > audit.json 2>&1 || true &&

              VULN_COUNT=\$(cat audit.json | jq '.vulnerabilities | length' 2>/dev/null || echo '0') &&
              echo \"Total vulnerabilities found: \$VULN_COUNT\" &&

              CRITICAL=\$(cat audit.json | jq '[.vulnerabilities[] | select(.advisory.severity == \"Critical\")] | length' 2>/dev/null || echo '0') &&
              HIGH=\$(cat audit.json | jq '[.vulnerabilities[] | select(.advisory.severity == \"High\")] | length' 2>/dev/null || echo '0') &&

              if [ \"\$CRITICAL\" -gt 0 ] || [ \"\$HIGH\" -gt 0 ]; then
                echo '' &&
                echo '❌ SECURITY ISSUE DETECTED!' &&
                echo '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━' &&
                echo \"Critical severity: \$CRITICAL\" &&
                echo \"High severity: \$HIGH\" &&
                echo '' &&
                echo 'Please update dependencies immediately!' &&
                echo '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━' &&
                cargo audit &&
                exit 1
              elif [ \"\$VULN_COUNT\" -gt 0 ]; then
                echo '' &&
                echo \"⚠️  \$VULN_COUNT vulnerability(ies) found (low/medium severity)\" &&
                echo '   Consider updating dependencies' &&
                cargo audit
              else
                echo '✅ No vulnerabilities found'
              fi
            "

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: brain-server-security-audit
          path: services/brain-server/audit.json
          retention-days: 30

  documentation:
    name: Documentation Check
    runs-on: [self-hosted, apple-container]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Build documentation
        working-directory: services/brain-server
        run: |
          echo "📚 Building documentation..."
          cargo doc --no-deps --all-features

      - name: Check for undocumented public items
        working-directory: services/brain-server
        run: |
          echo "🔍 Checking for undocumented public items..."

          # Capture doc build output
          cargo doc --no-deps 2>&1 | tee doc-output.txt || true

          # Check for missing documentation warnings
          UNDOC_COUNT=$(grep -c "missing documentation" doc-output.txt || echo "0")

          if [ "$UNDOC_COUNT" -gt 0 ]; then
            echo ""
            echo "⚠️  Found $UNDOC_COUNT undocumented public item(s)"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            grep "missing documentation" doc-output.txt || true
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            echo "Please add documentation comments (///) to these items"
            exit 1
          else
            echo "✅ All public items are documented"
          fi

      - name: Upload documentation
        uses: actions/upload-artifact@v4
        with:
          name: brain-server-documentation
          path: services/brain-server/target/doc/
          retention-days: 30

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./services/brain-server/target/doc
          publish_branch: gh-pages
          destination_dir: brain-server

  build-x86_64:
    name: Build (x86_64)
    runs-on: [self-hosted, apple-container]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: services/brain-server/target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('services/brain-server/**/Cargo.lock') }}

      - name: Build release binary
        run: |
          echo "🔨 Building release binary for x86_64 in AMD64 Linux container (via Rosetta)..."
          /usr/local/bin/container run --rm \
            --platform linux/amd64 \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -v ~/.cargo/registry:/root/.cargo/registry \
            -v ~/.cargo/git:/root/.cargo/git \
            -v "${GITHUB_WORKSPACE}/services/brain-server/target:/workspace/services/brain-server/target" \
            -w /workspace/services/brain-server \
            rust:latest \
            bash -c "
              rustup target add x86_64-unknown-linux-gnu &&
              RUSTFLAGS='-C opt-level=3 -C lto=fat' \
              cargo build --release --target x86_64-unknown-linux-gnu &&
              echo '✅ x86_64 binary built successfully'
            "

      - name: Verify binary
        run: |
          echo "✅ Verifying x86_64 binary..."
          test -f services/brain-server/target/x86_64-unknown-linux-gnu/release/brain-server
          ls -lh services/brain-server/target/x86_64-unknown-linux-gnu/release/brain-server

  build-arm64:
    name: Build (ARM64/Jetson)
    runs-on: [self-hosted, apple-container]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: services/brain-server/target
          key: ${{ runner.os }}-cargo-build-target-arm64-${{ hashFiles('services/brain-server/**/Cargo.lock') }}

      - name: Build for ARM64
        run: |
          echo "🔨 Building release binary for ARM64 in Linux container..."
          /usr/local/bin/container run --rm \
            --platform linux/arm64 \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -v ~/.cargo/registry:/root/.cargo/registry \
            -v ~/.cargo/git:/root/.cargo/git \
            -v "${GITHUB_WORKSPACE}/services/brain-server/target:/workspace/services/brain-server/target" \
            -w /workspace/services/brain-server \
            rust:latest \
            bash -c "
              rustup target add aarch64-unknown-linux-gnu &&
              RUSTFLAGS='-C target-cpu=native -C opt-level=3 -C lto=fat' \
              cargo build --release --target aarch64-unknown-linux-gnu -j 1 &&
              echo '✅ ARM64 binary built successfully'
            "

      - name: Upload ARM64 binary
        uses: actions/upload-artifact@v4
        with:
          name: brain-server-arm64
          path: services/brain-server/target/aarch64-unknown-linux-gnu/release/brain-server
          retention-days: 7

  performance-benchmarks:
    name: Performance Benchmarks
    runs-on: [self-hosted, apple-container]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Criterion
        run: cargo install cargo-criterion

      - name: Run benchmarks
        working-directory: services/brain-server
        run: |
          echo "⚡ Running performance benchmarks..."
          cargo criterion --features benchmark

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: brain-server-benchmarks
          path: services/brain-server/target/criterion/
          retention-days: 30

  ci-summary:
    name: CI Summary
    runs-on: [self-hosted, apple-container]
    needs:
      [
        format,
        lint,
        test,
        coverage,
        security-audit,
        documentation,
        build-x86_64,
        build-arm64,
      ]
    if: always()

    steps:
      - name: Generate CI summary
        run: |
          echo "## 🧪 Brain Server CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date)" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### 📊 Job Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Code Formatting | ${{ needs.format.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Linting | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Code Coverage | ${{ needs.coverage.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Audit | ${{ needs.security-audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Documentation | ${{ needs.documentation.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build (x86_64) | ${{ needs.build-x86_64.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build (ARM64) | ${{ needs.build-arm64.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Determine overall status
          if [ "${{ needs.format.result }}" == "success" ] && \
             [ "${{ needs.lint.result }}" == "success" ] && \
             [ "${{ needs.test.result }}" == "success" ] && \
             [ "${{ needs.coverage.result }}" == "success" ] && \
             [ "${{ needs.security-audit.result }}" == "success" ] && \
             [ "${{ needs.documentation.result }}" == "success" ] && \
             [ "${{ needs.build-x86_64.result }}" == "success" ] && \
             [ "${{ needs.build-arm64.result }}" == "success" ]; then
            echo "### ✅ All CI Checks Passed!" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Brain server is ready for deployment! 🚀" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ CI Failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "One or more checks failed. Please review the logs above." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
