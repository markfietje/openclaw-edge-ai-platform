name: Release (ARM64)

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  JETSON_USER: jetson
  JETSON_HOST: jetson
  DEPLOY_TIMEOUT: 120

jobs:
  validate-tag:
    name: Validate Release Tag
    runs-on: [self-hosted, apple-container]
    outputs:
      version: ${{ steps.parse.outputs.version }}
      is_valid: ${{ steps.validate.outputs.is_valid }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate tag format
        id: validate
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "Validating tag: $TAG"

          # Check if tag follows semantic versioning
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag $TAG does not follow semantic versioning (vX.Y.Z)"
            echo "is_valid=false" >> $GITHUB_OUTPUT
            exit 1
          fi

          echo "is_valid=true" >> $GITHUB_OUTPUT
          echo "✅ Tag format is valid"

      - name: Parse version
        id: parse
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Version: $VERSION"

      - name: Check for existing releases
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if gh release view "$TAG" &>/dev/null; then
            echo "::error::Release $TAG already exists"
            exit 1
          fi
          echo "✅ Tag is available for release"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pre-release-tests:
    name: Pre-Release Tests
    runs-on: [self-hosted, apple-container]
    needs: validate-tag
    if: needs.validate-tag.outputs.is_valid == 'true' && false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Create test script
        run: |
          cat > /tmp/run-tests.sh << 'EOF'
          #!/bin/bash
          set -e

          echo "📦 Installing protobuf compiler..."
          apt-get update -qq
          apt-get install -y -qq protobuf-compiler

          echo "🔧 Installing clippy..."
          rustup component add clippy rustfmt

          echo ""
          echo "🧠 Testing brain-server..."
          cd /workspace/services/brain-server
          cargo test --release
          cargo clippy -- -D warnings
          cargo fmt -- --check
          echo "✅ brain-server tests passed"

          echo ""
          echo "📡 Testing signal-gateway..."
          cd /workspace/services/signal-gateway
          cargo test --release
          cargo clippy -- -D warnings
          cargo fmt -- --check
          echo "✅ signal-gateway tests passed"

          echo ""
          echo "✅ All tests passed!"
          EOF

          chmod +x /tmp/run-tests.sh

      - name: Run pre-release tests in container
        run: |
          echo "🧪 Running tests inside Linux container..."

          /usr/local/bin/container run --rm \
            --platform linux/arm64 \
            -m 4G \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -v "/tmp/run-tests.sh:/run-tests.sh:ro" \
            -w "/workspace" \
            rust:latest \
            bash /run-tests.sh

  generate-changelog:
    name: Generate Comprehensive Changelog
    runs-on: [self-hosted, apple-container]
    needs: [validate-tag]
    if: always() && needs.validate-tag.result == 'success'

    outputs:
      changelog_path: ${{ steps.generate.outputs.changelog_path }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Make changelog script executable
        run: chmod +x scripts/generate-changelog.sh

      - name: Generate comprehensive changelog
        id: generate
        run: |
          VERSION="${{ needs.validate-tag.outputs.version }}"

          echo "📝 Generating comprehensive changelog for v${VERSION}..."

          # Run the changelog generator script
          ./scripts/generate-changelog.sh "$VERSION"

          # Set output path
          echo "changelog_path=build/release-notes.md" >> $GITHUB_OUTPUT

          echo "📄 Changelog generated at build/release-notes.md"

      - name: Upload changelog artifact
        uses: actions/upload-artifact@v4
        with:
          name: changelog
          path: build/release-notes.md
          retention-days: 90

  build-binaries:
    name: Build Binaries
    runs-on: [self-hosted, apple-container]
    needs: [validate-tag, generate-changelog]
    if: always() && needs.generate-changelog.result == 'success'

    strategy:
      matrix:
        include:
          - service: brain-server
            target: aarch64-unknown-linux-gnu
            arch: arm64
            platform: linux/arm64
          - service: signal-gateway
            target: aarch64-unknown-linux-gnu
            arch: arm64
            platform: linux/arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Pull Rust container image
        run: |
          echo "📦 Pulling Rust container image for ${{ matrix.platform }}..."
          /usr/local/bin/container image pull --platform ${{ matrix.platform }} rust:latest

      - name: Cache cargo
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            services/${{ matrix.service }}/target
          key: ${{ runner.os }}-${{ matrix.service }}-${{ matrix.arch }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build optimized binary (ARM64)
        if: matrix.arch == 'arm64'
        run: |
          echo "🏗️ Building ${{ matrix.service }} for ARM64 using Apple container..."

          # Run build inside ARM64 Linux container
          /usr/local/bin/container run --rm \
            --platform ${{ matrix.platform }} \
            -m 4G \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -w "/workspace/services/${{ matrix.service }}" \
            rust:latest \
            bash -c "
              apt-get update -qq && apt-get install -y -qq protobuf-compiler &&
              cargo build --release --target ${{ matrix.target }} &&
              if [ ! -f 'target/${{ matrix.target }}/release/${{ matrix.service }}' ]; then
                echo '::error::Binary not found after build';
                exit 1;
              fi &&
              echo '✅ Binary built successfully (ARM64)' &&
              ls -lh 'target/${{ matrix.target }}/release/${{ matrix.service }}' &&
              file 'target/${{ matrix.target }}/release/${{ matrix.service }}'
            "

      - name: Create release tarball
        run: |
          SERVICE="${{ matrix.service }}"
          ARCH="${{ matrix.arch }}"
          TARGET="${{ matrix.target }}"

          cd "services/${SERVICE}/target/${TARGET}/release"

          # Create tarball
          tar czf "${SERVICE}-${ARCH}.tar.gz" "${SERVICE}"

          # Generate checksum
          sha256sum "${SERVICE}-${ARCH}.tar.gz" > "${SERVICE}-${ARCH}.tar.gz.sha256"

          # Move to accessible location
          mv "${SERVICE}-${ARCH}.tar.gz" "${GITHUB_WORKSPACE}/"
          mv "${SERVICE}-${ARCH}.tar.gz.sha256" "${GITHUB_WORKSPACE}/"

          echo "✅ Tarball created: ${SERVICE}-${ARCH}.tar.gz"
          ls -lh "${GITHUB_WORKSPACE}/${SERVICE}-${ARCH}.tar.gz"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-${{ matrix.arch }}-binary
          path: |
            ${{ matrix.service }}-${{ matrix.arch }}.tar.gz
            ${{ matrix.service }}-${{ matrix.arch }}.tar.gz.sha256
          retention-days: 90

  build-debian-packages:
    name: Build Debian Packages
    runs-on: [self-hosted, apple-container]
    needs: [validate-tag, build-binaries]
    if: always() && needs.build-binaries.result == 'success'

    strategy:
      matrix:
        include:
          - service: brain-server
            arch: arm64
          - service: signal-gateway
            arch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.service }}-${{ matrix.arch }}-binary
          path: /tmp/binary

      - name: Extract binary
        run: |
          cd /tmp/binary
          tar xzf ${{ matrix.service }}-${{ matrix.arch }}.tar.gz

      - name: Create Debian packaging script
        run: |
          cat > /tmp/build-deb.sh << 'EOF'
          #!/bin/bash
          set -e

          VERSION=$1
          SERVICE=$2
          ARCH=$3

          echo "📦 Installing Debian packaging tools inside Linux container..."
          apt-get update -qq
          apt-get install -y -qq dpkg-dev fakeroot

          echo "🏗️ Building ${SERVICE}_${VERSION}_${ARCH}.deb..."
          cd /workspace/packages/${SERVICE}

          PKG_DIR="../../build/debian-packages/${SERVICE}_${VERSION}_${ARCH}"
          rm -rf "$PKG_DIR"
          mkdir -p "$PKG_DIR/DEBIAN"

          cp debian/control "$PKG_DIR/DEBIAN/"
          [ -f debian/postinst ] && cp debian/postinst "$PKG_DIR/DEBIAN/"
          [ -f debian/prerm ] && cp debian/prerm "$PKG_DIR/DEBIAN/"
          [ -f debian/postrm ] && cp debian/postrm "$PKG_DIR/DEBIAN/"
          chmod 755 "$PKG_DIR/DEBIAN/"*

          mkdir -p "$PKG_DIR/usr/local/bin"
          mkdir -p "$PKG_DIR/etc/systemd/system"
          mkdir -p "$PKG_DIR/etc/${SERVICE}"
          mkdir -p "$PKG_DIR/var/lib/${SERVICE}"
          mkdir -p "$PKG_DIR/usr/share/doc/${SERVICE}"

          cp "/tmp/binary/${SERVICE}" "$PKG_DIR/usr/local/bin/"
          chmod 755 "$PKG_DIR/usr/local/bin/${SERVICE}"

          if [ -f "${SERVICE}.service" ]; then
            cp "${SERVICE}.service" "$PKG_DIR/etc/systemd/system/"
            chmod 644 "$PKG_DIR/etc/systemd/system/${SERVICE}.service"
          fi

          if [ "${SERVICE}" = "signal-gateway" ]; then
            if [ -f "../../scripts/signal-gateway-wrapper.sh" ]; then
              cp "../../scripts/signal-gateway-wrapper.sh" "$PKG_DIR/usr/local/bin/"
              chmod 755 "$PKG_DIR/usr/local/bin/signal-gateway-wrapper.sh"
            fi
          fi

          if [ -f "../../README.md" ]; then
            cp "../../README.md" "$PKG_DIR/usr/share/doc/${SERVICE}/"
          fi

          sed -i "s/Version:.*/Version: ${VERSION}/" "$PKG_DIR/DEBIAN/control"
          sed -i "s/Architecture:.*/Architecture: ${ARCH}/" "$PKG_DIR/DEBIAN/control"

          cd ../../build/debian-packages
          fakeroot dpkg-deb --build "${SERVICE}_${VERSION}_${ARCH}"

          echo "✅ Build complete inside container!"
          EOF
          chmod +x /tmp/build-deb.sh

      - name: Run packaging script inside Apple Container
        run: |
          VERSION="${{ needs.validate-tag.outputs.version }}"
          SERVICE="${{ matrix.service }}"
          ARCH="${{ matrix.arch }}"

          /usr/local/bin/container run --rm \
            --platform linux/arm64 \
            -m 4G \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -v "/tmp/binary:/tmp/binary:ro" \
            -v "/tmp/build-deb.sh:/build-deb.sh:ro" \
            ubuntu:22.04 \
            bash /build-deb.sh "$VERSION" "$SERVICE" "$ARCH"

      - name: Upload Debian package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-${{ matrix.arch }}-deb
          path: build/debian-packages/${{ matrix.service }}_*_${{ matrix.arch }}.deb
          retention-days: 90

  create-github-release:
    name: Create GitHub Release
    runs-on: [self-hosted, apple-container]
    needs:
      [validate-tag, generate-changelog, build-binaries, build-debian-packages]
    if: always() && needs.build-debian-packages.result == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/artifacts

      - name: Prepare release assets
        run: |
          VERSION="${{ needs.validate-tag.outputs.version }}"
          TAG="v${VERSION}"

          echo "📦 Preparing release assets for ${TAG}..."

          # Create release directory
          mkdir -p /tmp/release-assets

          # Copy binary tarballs (ARM64 only)
          for service in brain-server signal-gateway; do
            if [ -f "/tmp/artifacts/${service}-arm64-binary/${service}-arm64.tar.gz" ]; then
              cp "/tmp/artifacts/${service}-arm64-binary/${service}-arm64.tar.gz" /tmp/release-assets/
              cp "/tmp/artifacts/${service}-arm64-binary/${service}-arm64.tar.gz.sha256" /tmp/release-assets/
            fi
          done

          # Copy Debian packages (ARM64 only)
          for service in brain-server signal-gateway; do
            if ls /tmp/artifacts/${service}-arm64-deb/*.deb 1> /dev/null 2>&1; then
              cp /tmp/artifacts/${service}-arm64-deb/*.deb /tmp/release-assets/
            fi
          done

          # Copy changelog
          if [ -f "/tmp/artifacts/changelog/release-notes.md" ]; then
            cp /tmp/artifacts/changelog/release-notes.md /tmp/release-notes.md
          fi

          # Generate comprehensive checksums using Alpine Linux in Apple Container
          echo "🧮 Generating SHA256 sums inside Linux container..."
          /usr/local/bin/container run --rm \
            --platform linux/arm64 \
            -m 4G \
            -v "/tmp/release-assets:/assets" \
            -w "/assets" \
            alpine:latest \
            sh -c "sha256sum * > SHA256SUMS.txt"

          # List all assets
          echo "✅ Release assets prepared:"
          ls -lh /tmp/release-assets/

          echo ""
          echo "Total size: $(du -sh /tmp/release-assets | cut -f1)"
          echo ""
          echo "Artifacts included:"
          echo "  - brain-server-arm64.tar.gz"
          echo "  - signal-gateway-arm64.tar.gz"
          echo "  - brain-server_*_arm64.deb"
          echo "  - signal-gateway_*_arm64.deb"
          echo "  - SHA256SUMS.txt"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body_path: /tmp/release-notes.md
          draft: false
          prerelease: false
          files: /tmp/release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify release
        run: |
          TAG="${{ github.ref_name }}"

          echo "🔍 Verifying release ${TAG}..."

          # Wait a moment for release to be available
          sleep 5

          # Check release exists
          if gh release view "$TAG" &>/dev/null; then
            echo "✅ Release ${TAG} created successfully"

            # Show release info
            gh release view "$TAG" | head -20
          else
            echo "::error::Release ${TAG} not found"
            exit 1
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-to-jetson:
    name: Deploy to Jetson Nano (ARM64)
    runs-on: [self-hosted, apple-container]
    needs: [validate-tag, create-github-release]
    if: always() && needs.create-github-release.result == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download ARM64 Debian packages
        uses: actions/download-artifact@v4
        with:
          pattern: "*-arm64-deb"
          path: /tmp/debian-packages
          merge-multiple: true

      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.JETSON_SSH_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.JETSON_SSH_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Save .deb packages to Jetson
        env:
          SSH_KEY: ${{ secrets.JETSON_SSH_KEY }}
        run: |
          VERSION="${{ needs.validate-tag.outputs.version }}"

          echo "📦 Saving .deb packages to Jetson..."

          # Create packages directory on Jetson
          ssh ${JETSON_USER}@${JETSON_HOST} "mkdir -p ~/deb-packages"

          # Copy .deb packages to Jetson
          scp /tmp/debian-packages/brain-server_${VERSION}_arm64.deb \
            ${JETSON_USER}@${JETSON_HOST}:~/deb-packages/

          scp /tmp/debian-packages/signal-gateway_${VERSION}_arm64.deb \
            ${JETSON_USER}@${JETSON_HOST}:~/deb-packages/

          echo "✅ .deb packages saved to Jetson"
          ssh ${JETSON_USER}@${JETSON_HOST} "ls -lh ~/deb-packages/"

      - name: Cleanup
        if: always()
        run: |
          rm -f ~/.ssh/id_ed25519
          rm -f ~/.ssh/known_hosts

  release-notification:
    name: Send Release Notification
    runs-on: [self-hosted, apple-container]
    needs: [validate-tag, create-github-release, deploy-to-jetson]
    if: always() && needs.create-github-release.result == 'success'

    steps:
      - name: Generate release summary
        run: |
          VERSION="${{ needs.validate-tag.outputs.version }}"
          TAG="v${VERSION}"

          echo "📊 Release Summary for ${TAG}"
          echo "═══════════════════════════════════════════════════════"
          echo ""
          echo "Version: ${VERSION}"
          echo "Release: https://github.com/markfietje/jetson-openclaw-setup/releases/tag/${TAG}"
          echo ""
          echo "Artifacts:"
          echo "  ARM64 (Jetson Nano):"
          echo "    - brain-server_${VERSION}_arm64.deb"
          echo "    - signal-gateway_0.1.1_arm64.deb"
          echo "    - brain-server-arm64.tar.gz"
          echo "    - signal-gateway-arm64.tar.gz"
          echo ""
          echo "  Checksums:"
          echo "    - SHA256SUMS.txt"
          echo ""

          if [ "${{ needs.deploy-to-jetson.result }}" = "success" ]; then
            echo "✅ Deployment: Successful"
            echo "   Both services are running on Jetson Nano (ARM64)"
          else
            echo "⚠️  Deployment: ${{ needs.deploy-to-jetson.result }}"
          fi

          echo ""
          echo "═══════════════════════════════════════════════════════"

      - name: Create tag commit message
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="${{ needs.validate-tag.outputs.version }}"
          TAG="v${VERSION}"

          echo "Release ${TAG} completed successfully!"
          echo ""
          echo "Multi-architecture release includes:"
          echo "  - ARM64 packages for Jetson Nano"
          echo "  - AMD64 packages for regular Linux"
          echo "  - Binary archives for both architectures"
          echo "  - Automatic deployment to Jetson Nano (ARM64)"
