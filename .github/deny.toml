# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

# This configuration file is used by cargo-deny to check for:
# - Security vulnerabilities (advisories)
# - License compliance
# - Duplicate dependencies
# - Banned dependencies
# - Required dependencies

[advisories]
# Security advisories configuration
# https://embarkstudios.github.io/cargo-deny/checks/advisories/cfg.html

# The path to the advisory database
db-path = "~/.cargo/advisory-db"

# The url to the advisory database
db-url = "https://github.com/RustSec/advisory-db"

# The maximum number of allowed vulnerabilities (set to 0 for production)
maximum = 0

# Ignore specific advisories (use sparingly, only for false positives)
ignore = [
    # Example: Ignore a specific advisory
    # "RUSTSEC-2020-0001",
]

# Warn about yanked crates
yanked = "warn"

# Check for vulnerabilities in dependencies
vulnerability = "deny"

# Check for unmaintained dependencies
unmaintained = "warn"

# Check for unsound dependencies
unsound = "warn"

# Security notices
notice = "warn"

[licenses]
# License compliance configuration
# https://embarkstudios.github.io/cargo-deny/checks/licenses/cfg.html

# List of explicitly allowed licenses
# These are OSI-approved licenses that are generally safe for production use
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "0BSD",
    "MPL-2.0",
    "CC0-1.0",
    "Unlicense",
    "BlueOak-1.0.0",
]

# List of explicitly denied licenses
# These licenses have restrictions that may not be suitable for production
deny = [
    "GPL-2.0",
    "GPL-2.0+",
    "GPL-3.0",
    "GPL-3.0+",
    "LGPL-2.0",
    "LGPL-2.0+",
    "LGPL-2.1",
    "LGPL-2.1+",
    "LGPL-3.0",
    "LGPL-3.0+",
    "AGPL-3.0",
    "AGPL-3.0+",
    "SSPL-1.0",
    "BUSL-1.1",
]

# Confidence threshold for license detection
# 0.0 - 1.0 (higher = more strict)
confidence-threshold = 0.8

# Allow private crates (for internal use)
private = { ignore = true }

# Clarify licenses for crates that don't have proper license metadata
# Use this when a crate's license is not properly specified
[[licenses.clarify]]
name = "ring"
version = "*"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 }
]

[bans]
# Dependency banning configuration
# https://embarkstudios.github.io/cargo-deny/checks/bans/cfg.html

# Deny multiple versions of the same crate
multiple-versions = "warn"

# Highlight multiple versions of the same crate
highlight = "all"

# Allow specific crates to have multiple versions
# Use sparingly, only when necessary
skip = [
    # Example: Allow multiple versions of a specific crate
    # { name = "ahash", version = "0.7.6" },
]

# Deny specific crates (banned dependencies)
deny = [
    # Crates with known security issues
    { name = "openssl", version = "<0.10.55" },

    # Crates that are unmaintained
    { name = "AppArmor" },

    # Example: Deny crates with specific licenses
    # { name = "some-crate", wrappers = ["some-wrapper"] },
]

# Allow specific crates that would otherwise be denied
allow = [
    # Example: Allow a specific crate
    # { name = "allowed-crate", version = "1.0.0" },
]

[sources]
# Source configuration
# https://embarkstudios.github.io/cargo-deny/checks/sources/cfg.html

# Deny unknown source registries
unknown-registry = "warn"

# Deny unknown git sources
unknown-git = "warn"

# Allow only specific registries
allow-registry = ["https://github.com/rust-lang/crates.io-index"]

# Allow specific git sources
allow-git = []

[sources.allow-org]
# Allow specific GitHub organizations
github = []

# Allow specific GitLab organizations
gitlab = []

# Allow specific BitBucket organizations
bitbucket = []

[output]
# Output configuration
# https://embarkstudios.github.io/cargo-deny/checks/output/cfg.html

# Output format
format = "human"

# Enable graph output
graph = { enabled = true, highlight = "all" }

# Output file path
output = "cargo-deny-report.json"

# Feature configuration
[features]
# Features to check
features = []

# Target configuration
[target]
# Target triple to check
target = "aarch64-unknown-linux-gnu"
```
This configuration file provides comprehensive security and license compliance for your production-ready workflow. It:

**✅ Security Features**:
- Checks for known vulnerabilities (0 allowed in production)
- Warns about unmaintained dependencies
- Warns about unsound code
- Detects yanked crates

**✅ License Compliance**:
- Allows only OSI-approved, production-safe licenses
- Denies copyleft licenses (GPL, LGPL, AGPL)
- Denies restrictive licenses (SSPL, BUSL)
- High confidence threshold for license detection

**✅ Dependency Management**:
- Warns about duplicate dependencies
- Bans insecure versions of OpenSSL
- Bans unmaintained crates
- Restricts to trusted registries

**✅ Production Ready**:
- Zero tolerance for vulnerabilities
- Strict license compliance
- Configurable for your specific needs
- Generates reports for audit trails

This will be used by the `cargo deny check` command in your production-ready workflow!
