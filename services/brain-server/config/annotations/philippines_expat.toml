]

[common_sequences]
# Common visa application sequences
sequence_1 = "passport → police clearance → medical exam → authentication → visa application → interview → visa issuance"
sequence_2 = "notary → authentication → dfa → embassy → visa processing → immigration"
sequence_3 = "letter of intent → marriage certificate → affidavit → interview → 13a visa"

[context_rules]
# Philippines-specific considerations
philippine_context = [
    "immigration offices often close early",
    "processing times vary by office",
    "bring multiple copies of documents",
    "wear formal attire for embassy visits",
    "expect long queues at immigration",
    "filipino time is real - be patient"
]

# Regional differences
regional_notes = [
    "manila immigration: faster but busier",
    "bacolod immigration: slower but more personal",
    "cebu immigration: moderate processing times",
    "negros occidental: kabankalan satellite office"
]

[exclusions]
# Things to exclude from entity extraction
exclude = [
    "very",
    "really",
    "quite",
    "too",
    "also",
    "just"
]

# === Additional Context (not processed by annotator) ===
# Typical costs (in PHP):
# - 13a visa application: ₱10,000-15,000
# - balikbayan visa: free (one year)
# - authentication: ₱100-300 per document
# - medical exam: ₱3,000-5,000
# - police clearance: ₱200-500
#
# Local terms:
# - po/opo: respectful markers
# - ate: older sister (respectful address to women)
# - kuya: older brother (respectful address to men)
# - ma'am/sir: formal address for officials
#
# Cultural tips:
# - always bring extra passport photos
# - wear formal/nice casual attire
# - be extra polite and patient
# - bring your own pen
# - arrive early in the morning
# - carry copies of everything
