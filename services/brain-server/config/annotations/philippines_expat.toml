[patterns]
# Visa numbers and codes
visa_patterns = [
    "(?i)\\b(13a|13b|13-a|13-b)\\s+visa\\b",
    "(?i)\\b(srrv|acr i-Card)\\b"
]

# Date patterns
date_patterns = [
    "(?i)\\b(january|february|march|april|may|june|july|august|september|october|november|december)\\s+[0-9]{1,2},?\\s+[0-9]{4}\\b",
    "(?i)\\b[0-9]{1,2}/[0-9]{1,2}/[0-9]{2,4}\\b"
]

# Money patterns
money_patterns = [
    "(?i)₱[0-9,]+\\.?[0-9]*",
    "(?i)php\\s+[0-9,]+",
    "(?i)pesos?\\s+[0-9,]+"
]

# Document codes
document_codes = [
    "(?i)\\b(Form [A-Z]?[0-9]+|NBI|BI)\\b"
]

[aliases]
# Common abbreviations and synonyms
bi = ["bureau of immigration", "immigration", "philippine immigration"]
nbi = ["national bureau of investigation", "police clearance"]
dfa = ["department of foreign affairs", "philippine dfa"]
red_ribbon = ["authentication", "legalization", "dfa authentication"]
srrv = ["special resident retiree's visa", "retirement visa"]
acri = ["acr i-card", "immigration card", "alien certificate"]

[high_priority_entities]
# Critical entities for Philippines immigration
critical = [
    "13a visa",
    "balikbayan",
    "philippine embassy",
    "notary",
    "authentication",
    "police clearance",
    "medical exam",
    "immigration",
