[domain]
name = "Travel & Pets"
version = "1.0"
description = "International pet relocation, travel logistics, and veterinary requirements"

[entities]
# Pet types and categories
pet_types = [
    "cat",
    "dog",
    "pet",
    "animal",
    "companion animal",
    "domestic pet"
]

# Pet demographics
pet_details = [
    "kitten",
    "puppy",
    "adult cat",
    "adult dog",
    "senior pet",
    "breed",
    "age",
    "weight"
]

# Travel and import processes
processes = [
    "pet import",
    "import clearance",
    "quarantine",
    "customs clearance",
    "spies import",
    "bureau of animal industry",
    "bai",
    "veterinary import permit"
]

# Airlines and flights
airlines = [
    "lufthansa",
    "korean air",
    "ethiad",
    "emirates",
    "qatar airways",
    "philippine airlines",
    "cathay pacific",
    "singapore airlines",
    "ana",
    "japan airlines"
]

# Travel equipment
equipment = [
    "pet crate",
    "travel crate",
    "sky kennel",
    "carrier",
    "cargo crate",
    "iata compliant crate",
    "hard-sided carrier",
    "soft-sided carrier"
]

# Documentation
documentation = [
    "health certificate",
    "veterinary certificate",
    "vaccination record",
    "microchip",
    "rabies certificate",
    "import permit",
    "export certificate",
    "endorsement"
]

# Veterinary services
veterinary = [
    "veterinarian",
    "vet",
    "veterinary clinic",
    "health exam",
    "blood test",
    "titer test",
    "rabies titer",
    "vaccination",
    "deworming",
    "flea treatment"
]

# Locations
locations = [
    "philippines",
    "manila",
    "cebu",
    "davao",
    "ninoy aquino international airport",
    "mactan cebu airport",
    "france",
    "ireland",
    "germany",
    "netherlands",
    "uae",
    "south korea",
    "japan"
]

# Travel logistics
logistics = [
    "cargo",
    "freight",
    "checked baggage",
    "cabin",
    "transit",
    "layover",
    "connection",
    "direct flight",
    "stopover"
]

# Timeframes
timeframes = [
    "30 days prior",
    "10 days prior",
    "48 hours",
    "24 hours",
    "quarantine period",
    "observation period",
    "processing time"
]

[relations]
# Travel processes
travels_on = ["travels on", "flies on", "takes", "uses"]
requires = ["requires", "needs", "must have", "necessitates"]
before = ["before", "prior to", "preceded by", "in advance of"]
after = ["after", "following", "subsequent to", "upon completion of"]

# Documentation and certification
certified_by = ["certified by", "endorsed by", "issued by", "signed by"]
valid_for = ["valid for", "accepted for", "recognized by"]
expires_in = ["expires in", "valid for", "good for"]

# Veterinary procedures
vaccinated_against = ["vaccinated against", "protected from", "immunized for"]
treated_for = ["treated for", "received", "underwent"]
tested_for = ["tested for", "screened for", "checked for"]

# Equipment and logistics
transported_in = ["transported in", "shipped in", "traveling in"]
compliant_with = ["compliant with", "meets", "satisfies", "adheres to"]

# Process dependencies
step_1 = ["first", "step 1", "initial", "starting with"]
step_2 = ["then", "next", "followed by", "subsequently"]
final_step = ["finally", "last", "ultimate", "concluding with"]

# Risk and safety
risk = ["risk of", "danger of", "potential for"]
prevents = ["prevents", "avoids", "mitigates", "reduces risk of"]

[patterns]
# Airline codes and flight numbers
flight_patterns = [
    "(?i)\\b(LH|KE|EY|EK|QR|PR|CX|SQ|NH|JL)[0-9]{3,4}\\b",
    "(?i)flight\\s+[0-9]+"
]

# Time periods
time_patterns = [
    "(?i)\\b(30|10|7|5|3|1)\\s+days?\\s+(prior|before|in advance)\\b",
    "(?i)\\b(48|24|12)\\s+hours?\\s+(prior|before)\\b"
]

# Measurements
measurement_patterns = [
    "(?i)\\b[0-9]+\\s+(kg|kilograms?|lbs?|pounds?|cm|centimeters?)\\b",
    "(?i)\\b[0-9]+\\s+(weeks?|months?|years?)\\s+old\\b"
]

# Document references
document_patterns = [
    "(?i)\\b(Form [A-Z]?[0-9]+|USDA Form|PH Vet Form)\\b",
    "(?i)\\b(Import Permit|Export Certificate|Health Certificate)\\b"
]

[aliases]
# Common abbreviations and synonyms
bai = ["bureau of animal industry", "philippine bai", "animal bureau"]
naia = ["ninoy aquino international", "manila airport", "mnl"]
crate = ["kennel", "carrier", "travel box", "shipping container"]
health_cert = ["health certificate", "veterinary health certificate", "vet certificate"]
import_permit = ["veterinary import permit", "bai permit", "import clearance"]
rabies = ["rabies vaccination", "anti-rabies", "rabies shot"]

[high_priority_entities]
# These are critical for pet relocation and should always be extracted
critical = [
    "import clearance",
    "health certificate",
    "rabies vaccination",
    "microchip",
    "pet crate",
    "airline",
    "quarantine"
]

[common_sequences]
# Common sequences in pet relocation
sequence_1 = "microchip → rabies vaccination → titer test → health certificate → import permit → flight"
sequence_2 = "veterinary exam → health certificate → endorsement → crate acclimation → travel day → import clearance"

[context_rules]
# Pet travel context
international_rules = [
    "check import requirements 6+ months before travel",
    "some countries require quarantine",
    "airline policies vary significantly",
    "temperature restrictions may apply"
]

[exclusions]
# Things to exclude from entity extraction
exclude = [
    "the",
    "a",
    "an",
    "and",
    "or",
    "but",
    "in",
    "on",
    "at",
    "to",
    "for",
    "of",
    "with"
]
